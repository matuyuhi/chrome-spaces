name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5.0.1

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version

      - run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build (tsc + vite)
        run: bun run build

      - name: Test (vitest + Storybook)
        run: bun test

      # Chrome extensions still need a real (non-headless) browser on
      # the Playwright-bundled Chromium, so the E2E suite runs headed
      # under xvfb. `bun run test:e2e` rebuilds dist/ to keep the script
      # self-contained for local use; on CI the build step above warmed
      # the same dist/ so it's a near no-op.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E (Playwright + unpacked extension)
        run: xvfb-run -a bun run test:e2e
