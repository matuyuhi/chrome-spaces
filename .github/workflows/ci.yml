name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-install-

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          # Bumping the playwright dep in bun.lock invalidates the cache.
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        # `--with-deps` runs apt-get for system libs (not cachable as a
        # directory). On a cache hit the browser bin is already there so
        # only the apt step actually does work.
        run: bunx playwright install --with-deps chromium

      - name: Build (tsc + vite)
        run: bun run build

      - name: Test (vitest + Storybook)
        # `bun test` invokes Bun's built-in test runner, which doesn't
        # know about vitest globals (vi.*) and would also discover the
        # e2e/ files outside of vitest.e2e.config.ts. Use `bun run test`
        # to dispatch through the package.json script into vitest.
        run: bun run test

      # Chrome extensions still need a real (non-headless) browser on
      # the Playwright-bundled Chromium, so the E2E suite runs headed
      # under xvfb. `bun run test:e2e` rebuilds dist/ to keep the script
      # self-contained for local use; on CI the build step above warmed
      # the same dist/ so it's a near no-op.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E (Playwright + unpacked extension)
        run: xvfb-run -a bun run test:e2e
