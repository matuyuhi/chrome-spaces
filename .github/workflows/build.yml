name: Build Extension

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch / tag / sha). Empty = current.
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v5.0.1
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-install-

      - run: bun install --frozen-lockfile

      - name: Build extension
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
        run: bun run build

      - name: Package extension zip
        id: pkg
        run: |
          version=$(jq -r '.version' package.json)
          short_sha=$(git rev-parse --short HEAD)
          zip_name="chrome-spaces-${version}-${short_sha}.zip"
          (cd dist && zip -r "../${zip_name}" .)
          echo "zip=${zip_name}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.pkg.outputs.zip }}
          path: ${{ steps.pkg.outputs.zip }}
          if-no-files-found: error
          retention-days: 30
