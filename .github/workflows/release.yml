name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      branch: ${{ steps.bump.outputs.branch }}
    steps:
      - uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0
          ref: main

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version

      - run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version on release branch
        id: bump
        run: |
          git checkout -b release/tmp
          new_version=$(npm version ${{ inputs.bump }} -m "chore(release): %s")
          branch="release/${new_version}"
          git branch -M "${branch}"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${new_version}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - name: Push release branch and tag
        run: |
          git push -u origin "${{ steps.bump.outputs.branch }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version

      - run: bun install --frozen-lockfile

      - name: Build extension
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
        run: bun run build

      - name: Package extension zip
        id: pkg
        run: |
          zip_name="chrome-spaces-${{ needs.prepare.outputs.version }}.zip"
          (cd dist && zip -r "../${zip_name}" .)
          echo "zip=${zip_name}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-zip
          path: ${{ steps.pkg.outputs.zip }}
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ZIP_PATH: chrome-spaces-${{ needs.prepare.outputs.version }}.zip
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: .

      - name: upload chrome extension zip to WebStore
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          client-id: ${{ secrets.WEBSTORE_CLIENT_ID }}
          client-secret: ${{ secrets.WEBSTORE_CLIENT_SECRET }}
          extension-id: ${{ secrets.WEBSTORE_EXTENSION_ID }}
          file-path: ${{ env.ZIP_PATH }}
          refresh-token: ${{ secrets.WEBSTORE_REFRESH_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --target "${BRANCH}" \
            --generate-notes \
            "${ZIP_PATH}"

      - name: Open PR to main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          {
            echo "Automated release PR for **${TAG}**."
            echo
            echo "Tag and GitHub Release are already published — merging this PR brings the version bump back into \`main\`."
            echo
            echo "Use **Merge commit** (not squash) so the tagged commit stays in main's history."
          } > pr-body.md
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "${BRANCH}" \
            --title "chore(release): ${TAG}" \
            --body-file pr-body.md
